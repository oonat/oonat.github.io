<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .fg-stroke { stroke: #1a1a1a; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    @media (prefers-color-scheme: dark) {
      .fg-stroke { stroke: #f5f5f5; }
    }
  </style>
  <g class="fg-stroke" stroke-width="4">
    <!-- Lens housing -->
    <circle cx="32" cy="32" r="25"/>
    <!-- Six aperture-blade edges; each runs from a point on the outer ring
         to a hex vertex 60° clockwise inward, producing the classic iris spiral -->
    <line x1="32"    y1="7"    x2="40.66" y2="27"/>
    <line x1="53.65" y1="19.5" x2="40.66" y2="37"/>
    <line x1="53.65" y1="44.5" x2="32"    y2="42"/>
    <line x1="32"    y1="57"   x2="23.34" y2="37"/>
    <line x1="10.35" y1="44.5" x2="23.34" y2="27"/>
    <line x1="10.35" y1="19.5" x2="32"    y2="22"/>
  </g>
</svg>
